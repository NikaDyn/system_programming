<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IF Explorer — Локації Івано-Франківська</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="toast-container"></div>

<!-- AUTH MODAL -->
<div id="auth-modal" class="modal-overlay">
    <div class="modal">
        <button class="modal-close" id="modal-close-btn">✕</button>
        <h2 class="modal-title" id="modal-title">З поверненням</h2>
        <p class="modal-sub" id="modal-sub">Увійдіть у свій акаунт</p>
        <form id="auth-form">
            <div class="field">
                <label>Email</label>
                <input type="email" id="auth-email" placeholder="ваш@email.com" required>
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" id="auth-password" placeholder="••••••••" required>
            </div>
            <!-- Завдання 1: CTA-кнопка з анімацією -->
            <button type="submit" class="modal-submit cta-btn" id="modal-btn">Увійти</button>
        </form>
        <div class="modal-toggle">
            <span id="toggle-text">Немає акаунту?</span>
            <a id="toggle-link-btn"> Зареєструватися</a>
        </div>
    </div>
</div>

<!-- HEADER -->
<header>
    <div class="logo">
        <div class="logo-dot"></div>
        IF Explorer
    </div>
    <!-- Завдання 2: Бургер-кнопка -->
    <button class="burger-btn" id="burger-btn" aria-label="Відкрити меню">
        <span></span><span></span><span></span>
    </button>
    <div class="header-right" id="header-auth"></div>
</header>

<!-- Завдання 2: Повноекранне мобільне меню -->
<nav class="mobile-menu" id="mobile-menu">
    <button class="mobile-menu-close" id="mobile-menu-close">✕</button>
    <ul class="mobile-nav-links">
        <li><a href="#map" class="mobile-nav-link">🗺 Карта</a></li>
        <li><a href="#filter-section" class="mobile-nav-link">📍 Локації</a></li>
        <li><a href="#add-section" class="mobile-nav-link">+ Додати місце</a></li>
    </ul>
    <div class="mobile-menu-footer">
        <button class="cta-btn mobile-login-btn" id="mobile-login-btn">Увійти</button>
    </div>
</nav>

<!-- MAIN LAYOUT -->
<div class="layout">
    <div class="map-section">
        <!-- Завдання 4: Фільтри з data-filter атрибутами -->
        <div class="map-toolbar" id="filter-section">
            <button class="filter-chip active" data-filter="all">🗺 Всі</button>
            <button class="filter-chip" data-filter="popular">🔥 Популярні</button>
            <button class="filter-chip" data-filter="new">✨ Нові</button>
            <div id="cat-chips"></div>
        </div>
        <div style="position:relative; flex:1">
            <div id="map"></div>
            <div class="map-hint" id="map-hint">Клікніть на карті, щоб вибрати координати</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-tabs">
            <button class="sidebar-tab active" id="tab-list">📍 Локації</button>
            <button class="sidebar-tab" id="tab-fav">⭐ Обране</button>
            <button class="sidebar-tab" id="tab-add">+ Додати</button>
        </div>
        <div class="sidebar-content" id="sidebar-content"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
